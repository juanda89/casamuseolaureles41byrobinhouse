name: Weekly agent

on:
  schedule:
    # Lunes 13:00 UTC = 8:00 AM Bogotá (UTC-5)
    - cron: '0 13 * * 1'
  workflow_dispatch: {}      # permite trigger manual desde la UI

permissions:
  contents: write             # para commitear el state file
  issues: write               # para crear el Issue semanal

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run weekly agent
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/weekly-agent.mjs

      - name: Commit state changes (si hubo)
        run: |
          git config user.name "casamuseo-agent[bot]"
          git config user.email "agent@casamuseolaureles.com"
          if ! git diff --quiet -- data/agent-state.json; then
            git add data/agent-state.json
            git commit -m "agent: state update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No state changes."
          fi
